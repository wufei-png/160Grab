name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            platform: windows
            arch: x64
          - label: macos-arm64
            os: macos-14
            platform: macos
            arch: arm64
          - label: macos-intel
            os: macos-15-intel
            platform: macos
            arch: intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Run unit tests
        run: |
          uv sync --extra dev
          uv run pytest -q
      - name: Build Windows release bundle
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./packaging/build-windows.ps1
      - name: Build macOS release bundle
        if: matrix.platform == 'macos'
        shell: bash
        run: ./packaging/build-macos.sh
      - name: Verify Windows frozen binary
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          & "./dist/release/160Grab-${{ matrix.label }}/160Grab.exe" --help
          & "./dist/release/160Grab-${{ matrix.label }}/160Grab.exe" --smoke-browser
      - name: Verify Windows config bootstrap
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $bundleDir = "./dist/release/160Grab-${{ matrix.label }}"
          $configPath = Join-Path $bundleDir "config.yaml"
          Remove-Item -Path $configPath -Force
          & (Join-Path $bundleDir "160Grab.exe")
          if ($LASTEXITCODE -ne 0) {
              throw "Frozen binary did not exit cleanly during config bootstrap test."
          }
          if (-not (Test-Path $configPath)) {
              throw "Frozen binary did not recreate config.yaml."
          }
      - name: Verify macOS frozen binary
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          "./dist/release/160Grab-${{ matrix.label }}/160Grab" --help
          "./dist/release/160Grab-${{ matrix.label }}/160Grab" --smoke-browser
      - name: Verify macOS config bootstrap
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="./dist/release/160Grab-${{ matrix.label }}"
          config_path="$bundle_dir/config.yaml"
          rm "$config_path"
          "$bundle_dir/160Grab"
          test -f "$config_path"
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            dist/release/160Grab-${{ matrix.label }}.zip
            dist/release/160Grab-${{ matrix.label }}.zip.sha256

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release-artifacts
          find . -type f -name '*.zip' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          cd release-artifacts
          mapfile -t zip_files < <(find . -type f -name '*.zip' | sort)
          if gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${zip_files[@]}" SHA256SUMS --repo "${GH_REPO}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${zip_files[@]}" SHA256SUMS --repo "${GH_REPO}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

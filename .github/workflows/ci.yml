name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Run unit tests
        run: |
          uv sync --extra dev
          uv run pytest -q

# Copy this file to config.yaml before local runs.
# Default flow: the script opens the login page, you log in manually,
# navigate to a doctor detail page, then press Enter in the terminal.
auth:
  strategy: "manual"
browser:
  launch_persistent_context: true
  profile_name:
  profiles_root_dir: "~/.160grab/browser-profiles"
  stealth: true
logging:
  jsonl_dir: "~/.160grab/logs"
  heartbeat_interval_seconds: 300
notifications:
  desktop: true
  rate_limit_threshold: 3
  webhook:
    url:
    timeout_seconds: 5
    headers: {}
member_id:
doctor_ids: []
weeks: []
days: []
hours:
  - "8-9"
sleep_time: "3000-5000"
page_action_sleep_time: "400-900"
booking_retry_sleep_time: "2000-4000"
rate_limit_sleep_time: "15000-25000"
brush_start_date:
enable_appoint: false
appoint_time:
booking_strategy: "page"

# Copy this file to config.yaml before local runs.
# Default flow: the script opens the login page, you log in manually,
# navigate to a doctor detail page, then press Enter in the terminal.
auth:
  strategy: "manual"
browser:
  launch_persistent_context: true
  profile_name:
  profiles_root_dir: "~/.160grab/browser-profiles"
  # 轮询期间后台保活登录态的间隔(秒)，0 表示禁用
  session_refresh_interval_seconds: 240
  # 登录态恢复最多重试次数；超过后直接结束运行
  session_recovery_max_attempts: 3
  # 连续进入第 2 次及以后恢复前的冷却时间(秒)
  session_recovery_cooldown_seconds: 30
  # 列表点进详情空白时可改为 false 试兼容性；默认 true 使用 playwright-stealth
  stealth: true
logging:
  jsonl_dir: "~/.160grab/logs"
  heartbeat_interval_seconds: 300
notifications:
  desktop: true
  rate_limit_threshold: 3
  webhook:
    url:
    timeout_seconds: 5
    headers: {}
member_id:
doctor_ids: []
weeks: []
days: []
hours:
  - "8-9"
# 刷号轮询间隔(ms)，范围或固定值；觉得慢可调低如 "1500-2500"
sleep_time: "3000-5000"
# 打开预约页、提交前随机停顿(ms)
page_action_sleep_time: "400-900"
# 同一号源重试间隔(ms)
booking_retry_sleep_time: "2000-4000"
# 命中「访问次数过多」等提示后的冷却(ms)
rate_limit_sleep_time: "15000-25000"
brush_start_date:
enable_appoint: false
appoint_time:
booking_strategy: "page"
